name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick newest Xcode 16
        run: |
          # Use the highest Xcode_16*.app available; macOS runner images vary.
          NEWEST=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$NEWEST" ]; then
            echo "No Xcode 16 found, falling back to default";
            xcode-select -p
          else
            sudo xcode-select -s "$NEWEST/Contents/Developer"
          fi
          xcodebuild -version

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Pick a Simulator that exists
        id: sim
        run: |
          DEST=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          best = None
          for runtime, devs in data['devices'].items():
              if 'iOS' not in runtime: continue
              for d in devs:
                  if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                      best = d['name']
                      break
              if best: break
          print(best or 'iPhone 16 Pro')
          ")
          echo "Picked simulator: $DEST"
          echo "device=$DEST" >> $GITHUB_OUTPUT

      - name: Resolve scheme
        run: xcodebuild -list -project NeonTetris.xcodeproj

      - name: Build (Simulator, Debug)
        id: build
        run: |
          set +e
          mkdir -p logs
          xcodebuild \
            -project NeonTetris.xcodeproj \
            -scheme NeonTetris \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee logs/build.log
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          exit $EXIT

      - name: Dump errors to job summary
        if: failure()
        run: |
          {
            echo "## ❌ Build failure"
            echo ""
            echo "### Errors (first 60)"
            echo '```'
            grep -E "error:|warning:|fatal error|\.swift:[0-9]+:[0-9]+:" logs/build.log | head -60 || echo "(no error lines matched)"
            echo '```'
            echo ""
            echo "### Last 200 lines of full log"
            echo '```'
            tail -n 200 logs/build.log
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: logs/build.log
          if-no-files-found: ignore

      - name: Run unit tests
        id: tests
        if: success()
        run: |
          set +e
          mkdir -p logs
          xcodebuild \
            -project NeonTetris.xcodeproj \
            -scheme NeonTetris \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee logs/test.log
          EXIT=${PIPESTATUS[0]}
          exit $EXIT

      - name: Dump test errors to job summary
        if: failure() && steps.tests.conclusion == 'failure'
        run: |
          {
            echo "## ❌ Tests failed"
            echo ""
            echo "### Test failures"
            echo '```'
            grep -E "(error:|failed|XCTAssert|Assertion|Test Case .* failed|\.swift:[0-9]+)" logs/test.log | head -80 || echo "(no matching lines)"
            echo '```'
            echo ""
            echo "### Last 250 lines"
            echo '```'
            tail -n 250 logs/test.log
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: logs/test.log
          if-no-files-found: ignore

      - name: Post failure log as issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = `Run #${context.runNumber} failed on commit ${context.sha.slice(0,7)}.\n\n`;
            const dumpFile = (label, path) => {
              try {
                const content = fs.readFileSync(path, 'utf8');
                // Grab the most-relevant chunk for tests, full tail for build.
                let snippet;
                if (path.includes('test')) {
                  const lines = content.split('\n');
                  const matches = lines
                    .map((l, i) => ({ l, i }))
                    .filter(x => /(error:|XCTAssert|failed|Test Case .* (started|failed|passed)|\.swift:[0-9]+:[0-9]+|<unknown>|Stack trace)/.test(x.l))
                    .map(x => x.l);
                  snippet = matches.slice(0, 200).join('\n');
                  if (!snippet) snippet = lines.slice(-200).join('\n');
                } else {
                  snippet = content.split('\n').slice(-200).join('\n');
                }
                body += `### ${label}\n\n\`\`\`\n${snippet.slice(-30000)}\n\`\`\`\n\n`;
              } catch(e) {
                body += `### ${label}\n\n(file missing: ${e.message})\n\n`;
              }
            };
            dumpFile('Test log (filtered)', 'logs/test.log');
            dumpFile('Build log tail', 'logs/build.log');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failure: run #${context.runNumber}`,
              body
            });
