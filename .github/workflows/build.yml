name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build for iOS Simulator
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve scheme
        run: xcodebuild -list -project NeonTetris.xcodeproj

      - name: Build (Simulator, Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project NeonTetris.xcodeproj \
            -scheme NeonTetris \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify --renderer github-actions || \
          xcodebuild \
            -project NeonTetris.xcodeproj \
            -scheme NeonTetris \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project NeonTetris.xcodeproj \
            -scheme NeonTetris \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify --renderer github-actions || \
          xcodebuild \
            -project NeonTetris.xcodeproj \
            -scheme NeonTetris \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test
