name: Simulator build + screenshots

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Simulator device name'
        required: false
        default: 'iPhone 16 Pro'

jobs:
  simulator:
    name: Build .app and capture screenshots
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick newest Xcode 16
        run: |
          NEWEST=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$NEWEST" ]; then
            NEWEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          if [ -z "$NEWEST" ]; then
            echo "::error::No Xcode found on runner"; exit 1
          fi
          sudo xcode-select -s "$NEWEST/Contents/Developer"
          xcodebuild -version

      - name: Pick a Simulator device that exists
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          want = '${{ inputs.device }}'.strip()
          best = None
          for runtime, devs in data['devices'].items():
              if 'iOS' not in runtime: continue
              for d in devs:
                  if d.get('isAvailable') and (not want or d.get('name') == want):
                      best = d['name']; break
              if best: break
          if not best:
              for runtime, devs in data['devices'].items():
                  if 'iOS' not in runtime: continue
                  for d in devs:
                      if d.get('isAvailable') and 'iPhone' in d.get('name',''):
                          best = d['name']; break
                  if best: break
          print(best or 'iPhone 16 Pro')
          ")
          echo "Picked simulator device: $DEVICE"
          echo "device=$DEVICE" >> $GITHUB_OUTPUT

      - name: Build for simulator
        run: |
          xcodebuild \
            -project NeonTetris.xcodeproj \
            -scheme NeonTetris \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate built .app
        id: locate
        run: |
          APP_PATH=$(find build/Build/Products -name "NeonTetris.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "NeonTetris.app not found"; exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "Found at $APP_PATH"

      - name: Zip .app for Appetize / manual download
        run: |
          mkdir -p artifacts
          cd "$(dirname "${{ steps.locate.outputs.APP_PATH }}")"
          zip -ry "$GITHUB_WORKSPACE/artifacts/NeonTetris-Simulator.zip" "NeonTetris.app"

      - name: Boot simulator and install
        id: boot
        run: |
          # Create a fresh simulator each run so screenshots are deterministic.
          UDID=$(xcrun simctl create "NeonTetris-CI" "${{ steps.sim.outputs.device }}")
          echo "UDID=$UDID" >> $GITHUB_OUTPUT
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" "${{ steps.locate.outputs.APP_PATH }}"

      - name: Launch app and capture screenshots
        run: |
          UDID="${{ steps.boot.outputs.UDID }}"
          mkdir -p Screenshots

          BUNDLE_ID=$(plutil -p "${{ steps.locate.outputs.APP_PATH }}/Info.plist" | awk -F\" '/CFBundleIdentifier/{print $4}')
          echo "Bundle: $BUNDLE_ID"

          # simctl does not provide UI tap automation. Instead we use the
          # iOS launch-arg convention: any "-<key> <value>" pair on the
          # `simctl launch` command line becomes a UserDefaults entry for the
          # duration of the process. The app reads NEON_INITIAL_SCREEN at
          # startup and jumps directly to the requested screen.
          capture () {
            local screen=$1
            local out=$2
            local settle=${3:-3}
            echo "::group::Capturing $screen -> $out"
            xcrun simctl terminate "$UDID" "$BUNDLE_ID" 2>/dev/null || true
            sleep 1
            xcrun simctl launch "$UDID" "$BUNDLE_ID" -NEON_INITIAL_SCREEN "$screen"
            sleep "$settle"
            xcrun simctl io "$UDID" screenshot --type=png "Screenshots/$out"
            echo "::endgroup::"
          }

          # Splash needs to be captured BEFORE its 1.5 s auto-advance fires.
          capture splash      01-splash.png       0.6
          capture mainMenu    02-main-menu.png    2
          capture game        03-gameplay.png     3
          capture settings    04-settings.png     2
          capture about       05-about.png        2

          # Bonus: a gameplay shot where a few pieces have already settled
          # under gravity. Launch fresh game and just wait.
          xcrun simctl terminate "$UDID" "$BUNDLE_ID" 2>/dev/null || true
          sleep 1
          xcrun simctl launch "$UDID" "$BUNDLE_ID" -NEON_INITIAL_SCREEN game
          sleep 8
          xcrun simctl io "$UDID" screenshot --type=png Screenshots/06-gameplay-stacked.png

          ls -la Screenshots/

      - name: Teardown simulator
        if: always()
        run: |
          UDID="${{ steps.boot.outputs.UDID }}"
          if [ -n "$UDID" ]; then
            xcrun simctl shutdown "$UDID" || true
            xcrun simctl delete "$UDID" || true
          fi

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonTetris-Simulator-app
          path: artifacts/NeonTetris-Simulator.zip
          retention-days: 14

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonTetris-Screenshots
          path: Screenshots/
          retention-days: 30
