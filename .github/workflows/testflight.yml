name: TestFlight

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Override build number (optional)'
        required: false
        type: string

# Required secrets — set them in
# Settings → Secrets and variables → Actions → New repository secret
#
#   APP_STORE_CONNECT_API_KEY_ID      — Key ID (10 chars) from App Store Connect → Users and Access → Integrations → Team Keys
#   APP_STORE_CONNECT_API_ISSUER_ID   — Issuer UUID shown at the top of that page
#   APP_STORE_CONNECT_API_PRIVATE_KEY — Contents of the .p8 file you downloaded (the whole `-----BEGIN PRIVATE KEY-----` block)
#   BUILD_CERTIFICATE_BASE64          — base64 of your Apple Distribution .p12 cert.   `base64 -w0 cert.p12`
#   BUILD_CERTIFICATE_PASSWORD        — Password used when exporting the .p12
#   PROVISIONING_PROFILE_BASE64       — base64 of the App Store provisioning profile (.mobileprovision)
#   KEYCHAIN_PASSWORD                 — Any random string. Used to create a temporary keychain on the runner.
#   BUNDLE_IDENTIFIER                 — e.g. com.yourname.neontetris (must match Xcode project)
#   TEAM_ID                           — Your 10-character Apple Team ID

jobs:
  upload:
    name: Archive & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_CERTIFICATE_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH \
            -P "$BUILD_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i $PROFILE_PATH | plutil -extract UUID raw -)
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Set build number
        run: |
          if [ -n "${{ inputs.build_number }}" ]; then
            BN="${{ inputs.build_number }}"
          else
            BN="${{ github.run_number }}"
          fi
          echo "BUILD_NUMBER=$BN" >> $GITHUB_ENV
          echo "Using build number $BN"

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
        run: |
          xcodebuild \
            -project NeonTetris.xcodeproj \
            -scheme NeonTetris \
            -configuration Release \
            -archivePath $RUNNER_TEMP/NeonTetris.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=$TEAM_ID \
            PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_IDENTIFIER \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            archive

      - name: Export IPA
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
          BUNDLE_IDENTIFIER: ${{ secrets.BUNDLE_IDENTIFIER }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/NeonTetris.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          # Write the .p8 key where altool/notarytool expect it
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          IPA=$(ls $RUNNER_TEMP/export/*.ipa | head -n 1)
          echo "Uploading $IPA"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload archive as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NeonTetris-archive
          path: ${{ runner.temp }}/NeonTetris.xcarchive
          if-no-files-found: ignore
